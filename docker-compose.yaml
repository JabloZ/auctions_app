version: '3.8'

services:
  backend:
    build: ./src/backend
    container_name: cs_serv
    working_dir: /app
    ports:
      - "8001:8001"
    volumes:
      - ./src/backend:/app
      - ./src/frontend:/frontend
    command: sh -c "dotnet run Main.cs"
  frontend:
    build: ./src/frontend
    container_name: react_front
    working_dir: /app/react
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev --host"
  db:    
    build: ./src/db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auction_db
