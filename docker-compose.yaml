version: '3.8'

services:
  backend:
    build: ./src/backend
    container_name: cs_serv
    working_dir: /app
    networks:
      - app_network
    ports:
      - "8001:8001"
    volumes:
      - ./src/backend:/app
      - ./src/frontend:/frontend
    environment:
      - CONNECTION_STRING=Host=${DB_HOST};Port=${DB_PORT};Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}
    command: sh -c "dotnet run --project server"
  frontend:
    build: ./src/frontend
    container_name: react_front
    working_dir: /app/react
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    networks:
      - app_network
    command: sh -c "npm install && npm run dev --host"
  db:    
    build: ./src/db
    container_name: auction_db
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - app_network

networks:
  app_network:
    driver: bridge