version: '3.8'

services:
  backend:
    build: ./src/backend
    container_name: cs_serv
    working_dir: /app
    ports:
      - "8001:8001"
    volumes:
      - ./src/backend:/app
      - ./src/frontend:/frontend
    command: sh -c "dotnet run Main.cs"
  frontend:
    build: ./src/frontend
    container_name: react_front
    working_dir: /app
    volumes:
      - ./src/frontend:/app

  